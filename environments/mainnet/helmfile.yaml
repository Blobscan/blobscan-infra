helmDefaults:
  createNamespace: true

releases:
  - name: blobscan
    namespace: mainnet
    chart: blobscan/blobscan
    version: 0.11.5
    values:
      - values.yaml
    secrets:
      - secrets.yaml

  - name: ipfs-gateway
    namespace: mainnet
    chart: ../../kubernetes/helm/ipfs-gateway
    values:
      - ingress:
          host: blobscan.com
          tlsSecretName: mainnet-blobscan-tls
