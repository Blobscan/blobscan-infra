blobscan-api:
  annotations:
    keel.sh/policy: major
    keel.sh/approvals: "0"
  podLabels:
    environment: gnosis

  # externalConfigMaps:
  #   - "blobscan"
  fullnameOverride: "blobscan-api"
  config:
    CHAIN_ID: "100"
    NETWORK_NAME: "gnosis"
    BLOBSCAN_API_BASE_URL: "https://api.gnosis.blobscan.com"
    POSTGRES_STORAGE_ENABLED: "false"
    GOOGLE_STORAGE_ENABLED: "true"
    GOOGLE_STORAGE_BUCKET_NAME: blobscan-production
    GOOGLE_STORAGE_PROJECT_ID: blobscan-379218
    METRICS_ENABLED: "true"
    LOG_LEVEL: "http"
    TRUSTED_PROXIES: "10.108.0.0/20"
    BLOB_DATA_API_ENABLED: "false"

  extraEnv:
    - name: BLOB_PROPAGATOR_COMPLETED_JOBS_AGE
      value: "1"
    - name: PRIMARY_BLOB_STORAGE
      value: "IPFS"
    - name: MATOMO_ENABLED
      value: "true"
    - name: MATOMO_SITE_ID
      value: "2"
    - name: MATOMO_URL
      value: "https://matomo.blobscan.com/matomo.php"
    - name: GOOGLE_STORAGE_SIGNED_URLS_ENABLED
      value: "true"
    - name: IPFS_STORAGE_ENABLED
      value: "true"
    - name: IPFS_STORAGE_GATEWAY_URL
      value: "https://gnosis.blobscan.com"
    - name: IPFS_STORAGE_IPLD_URL
      value: "http://blobscan-ipld:8080"

  bullmqExporter:
    enabled: true
    databaseMapping: "0:gnosis"
    image:
      pullPolicy: "Always"
    service:
      annotations:
        k8s.grafana.com/scrape: "true"

  service:
    annotations:
      k8s.grafana.com/scrape: "true"

  image:
    tag: 1
    pullPolicy: "Always"

  ingress:
    enabled: true
    className: nginx-pp
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-dns-gcp
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: "api.gnosis.blobscan.com"
        paths:
        - path: "/"
          pathType: Prefix
    tls:
      - secretName: api-gnosis-blobscan-tls
        hosts:
          - "api.gnosis.blobscan.com"

  resources:
    limits:
      cpu: 2
      memory: 1Gi

    requests:
      cpu: 100m
      memory: 512Mi

blobscan-indexer:
  annotations:
    keel.sh/policy: major
    keel.sh/approvals: "0"
  # customArgs: ["-s", "1"]
  podLabels:
    environment: gnosis
  fullnameOverride: "blobscan-indexer"
  config:
    BLOBSCAN_API_ENDPOINT: "http://blobscan-api:3001"
    RUST_LOG: "blob_indexer=INFO"
    NETWORK_NAME: "gnosis"

  image:
    tag: 0
    pullPolicy: "Always"

blobscan-web:
