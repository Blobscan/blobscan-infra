    keel.sh/approvals: "0"
  podLabels:
    environment: gnosis
  fullnameOverride: "blobscan-web"
  config:
    NETWORK_NAME: "gnosis"
    BLOBSCAN_API_BASE_URL: "https://api.gnosis.blobscan.com"
    BLOBSCAN_API_PORT: 443
    POSTGRES_STORAGE_ENABLED: "false"
    GOOGLE_STORAGE_ENABLED: "true"
    GOOGLE_STORAGE_BUCKET_NAME: blobscan-production
    GOOGLE_STORAGE_PROJECT_ID: blobscan-379218
    METRICS_ENABLED: "true"
    LOG_LEVEL: info
  extraEnv:
    - name: PUBLIC_NETWORK_NAME
      value: "gnosis"
    - name: PUBLIC_POSTHOG_ID
      value: "phc_n7WONIedZmpeWUlvgQq2KW3p59g6Au8JDTRVciqpcWl"
    - name: PUBLIC_POSTHOG_HOST
      value: "https://us.i.posthog.com"
    - name: PUBLIC_MATOMO_TAG_MANAGER_CONTAINER_URL
      value: "https://matomo.blobscan.com/js/container_5gsEruk6.js"
    - name: SENTRY_ORG
      value: "blossom-labs"
    - name: SENTRY_PROJECT
      value: "blobscan-web"
    - name: SENTRY_IGNORE_API_RESOLUTION_ERROR
      value: "1"
    - name: GOOGLE_STORAGE_SIGNED_URLS_ENABLED
      value: "true"
    - name: IPFS_STORAGE_GATEWAY_URL
      value: "https://gnosis.blobscan.com"
    - name: IPFS_STORAGE_IPLD_URL
      value: "http://blobscan-ipld:8080"

  image:
    tag: 1
    pullPolicy: Always

  ingress:
    enabled: true
    className: nginx-pp
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-dns-gcp
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: "gnosis.blobscan.com"
        paths:
        - path: "/"
          pathType: Prefix
    tls:
      - secretName: gnosis-blobscan-tls
        hosts:
          - "gnosis.blobscan.com"

  resources:
    limits:
      cpu: 2
      memory: 512Mi

    requests:
      cpu: 100m
      memory: 128Mi

blobscan-ipld:
  enabled: true

  fullnameOverride: "blobscan-ipld"

  podLabels:
    environment: gnosis

  annotations:
    keel.sh/policy: major
    keel.sh/approvals: "0"

  image:
    tag: latest
    pullPolicy: "Always"

  # Run in push-API mode: blobs are POSTed to /blob; no beacon RPC needed.
  customCommand: ["blobscan-ipld", "serve"]

  # Provision the ipld database in the existing gnosis CNPG cluster.
  # Owner role "blobscan" already exists.
  database:
    create: true
    clusterName: "blobscan-gnosis-db-cluster"
    name: "ipld_gnosis"
    owner: "blobscan"

  # State file lives on a retained PVC; CAR archives use ephemeral storage.
  persistence:
    enabled: true
    storageClass: "do-block-storage-retain"
    size: 20Gi

  config:
    NETWORK_NAME: "gnosis"
    IPFS_API_ADDR: "http://tailscale-subnet-router.tailscale.svc.cluster.local:5001"
    IPFS_PIN_ON_ADD: "true"
    DATA_DIR: "/data"
    CAR_DIR: "/car"
    GENERATOR_START_EPOCH: "28869613"
    # Push API listen address (serve mode).
    GENERATOR_API_LISTEN: ":8080"

  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  networkPolicy:
    enabled: true
    ingress:
      from:
        # blobscan-api POSTs blobs to /blob on the push API (8080).
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: blobscan-api
        # Prometheus scrapes /metrics.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP

  serviceMonitor:
    enabled: true
    relabelings:
      - action: replace
        replacement: gnosis
        targetLabel: environment

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

blobscandb:
  enabled: false

redis:
  enabled: true
  global:
    defaultStorageClass: "do-block-storage-retain"

  image:
    registry: ghcr.io
    repository: element-hq/bitnamilegacy/redis
    tag: 7.2.5-debian-12-r4

  metrics:
    enabled: true
    image:
      registry: ghcr.io
      repository: element-hq/bitnamilegacy/redis-exporter
      tag: 1.58.0-debian-12-r4
    serviceMonitor:
      # TODO: enable
      enabled: false

  master:
    persistence:
      enabled: true
      storageClass: "do-block-storage-retain"
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    resources:
      limits:
        cpu: 150m
        memory: 2Gi
        ephemeral-storage: 2Gi

      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 50Mi
  # TODO:
  #  configuration: "maxmemory-policy noeviction"
