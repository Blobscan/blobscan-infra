helmDefaults:
  createNamespace: true

releases:
  - name: blobscan
    namespace: gnosis
    chart: blobscan/blobscan
    version: 0.11.6
    values:
      - values.yaml
    secrets:
      - secrets.yaml

  - name: ipfs-gateway
    namespace: gnosis
    chart: ../../kubernetes/helm/ipfs-gateway
    values:
      - ingress:
          host: gnosis.blobscan.com
          tlsSecretName: gnosis-blobscan-tls
