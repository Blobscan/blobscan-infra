blobscan-api:
  annotations:
    keel.sh/policy: "force"
    keel.sh/match-tag: "true"
    keel.sh/approvals: "0"

  podLabels:
    environment: staging

  externalConfigMaps:
    - "blobscan"

  fullnameOverride: "blobscan-api"
  config:
    CHAIN_ID: "1"
    NETWORK_NAME: "mainnet"
    BLOBSCAN_API_BASE_URL: "https://api.staging.blobscan.com"
    # BLOBSCAN_API_BASE: "api.staging.blobscan.com"
    # BLOBSCAN_API_PORT  # TODO remove, unused
    POSTGRES_STORAGE_ENABLED: "false"
    METRICS_ENABLED: "true"
    LOG_LEVEL: debug
    TRUSTED_PROXIES: "10.108.0.0/20,10.109.0.0/16"
    # NODE_ENV: "production"
    ETH_PRICE_SYNCER_ENABLED: "true"
    ETH_PRICE_SYNCER_TIME_TOLERANCE: "100"
    # TODO: in web too?
    BLOB_DATA_API_ENABLED: "false"

  extraEnv:
    - name: BLOB_PROPAGATOR_COMPLETED_JOBS_AGE
      value: "1"
    - name: PRIMARY_BLOB_STORAGE
      value: "IPFS"
    - name: MATOMO_ENABLED
      value: "true"
    - name: MATOMO_SITE_ID
      value: "2"
    - name: MATOMO_URL
      value: "https://matomo.blobscan.com/matomo.php"
    - name: IPFS_STORAGE_ENABLED
      value: "true"
    - name: IPFS_STORAGE_GATEWAY_URL
      value: "https://staging.blobscan.com"
    - name: IPFS_STORAGE_IPLD_URL
      value: "http://blobscan-ipld:8080"

  bullmqExporter:
    enabled: true
    databaseMapping: "0:staging"
    image:
      pullPolicy: "Always"
    service:
      annotations:
        k8s.grafana.com/scrape: "true"
    serviceMonitor:
      enabled: true
      relabelings:
        - action: replace
          replacement: staging
          targetLabel: environment

#   serviceMonitor:
#     enabled: true
#     relabelings:
#       - action: replace
#         replacement: staging
#         targetLabel: environment

  service:
    annotations:
      k8s.grafana.com/scrape: "true"
  # TODO: remove servicemonitor
  serviceMonitor:
    enabled: true
    relabelings:
      - action: replace
        replacement: staging
        targetLabel: environment

  image:
    tag: development
    pullPolicy: "Always"

  ingress:
    enabled: true
    className: nginx-pp
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-dns-gcp
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      # service.beta.kubernetes.io/do-loadbalancer-name: api.staging.blobscan.com

    hosts:
      - host: "api.staging.blobscan.com"
        paths:
        - path: "/"
          pathType: Prefix
    tls:
      - secretName: api-staging-blobscan-tls
        hosts:
          - "api.staging.blobscan.com"

  networkPolicy:
    enabled: true
    ingress:
      from:
        # nginx ingress controller forwards external HTTP traffic.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
        # Prometheus scrapes /metrics.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        # blobscan-web and blobscan-indexer call the API from the same namespace.
        - podSelector: {}
      ports:
        - port: 3001
          protocol: TCP

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 1Gi

blobscan-indexer:
  annotations:
    keel.sh/policy: "force"
    keel.sh/match-tag: "true"
    keel.sh/approvals: "0"

  customArgs: ["-s", "1"]
  podLabels:
    environment: staging

  fullnameOverride: "blobscan-indexer"
  config:
    BLOBSCAN_API_ENDPOINT: "http://blobscan-api:3001"
    RUST_LOG: "blob_indexer=INFO"

  image:
    tag: master
    pullPolicy: "Always"

  networkPolicy:
    enabled: true
    ingress:
      # Default-deny: indexer is a pure outbound worker, no inbound traffic.
      from: []
      ports: []

blobscan-web:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 2
      memory: 512Mi

  replicas: 2
  annotations:
