  fullnameOverride: "blobscan-web"
  config:
    NETWORK_NAME: "mainnet"
    BLOBSCAN_API_BASE_URL: "https://api.staging.blobscan.com"
    BLOBSCAN_API_PORT: 443
    TRUSTED_PROXY_COUNT: "1"
    POSTGRES_STORAGE_ENABLED: "false"
    METRICS_ENABLED: "true"
    LOG_LEVEL: debug
  extraEnv:
    - name: PUBLIC_POSTHOG_ID
      value: "phc_n7WONIedZmpeWUlvgQq2KW3p59g6Au8JDTRVciqpcWl"
    - name: PUBLIC_POSTHOG_HOST
      value: "https://us.i.posthog.com"
    - name: SENTRY_ORG
      value: "blossom-labs"
    - name: SENTRY_PROJECT
      value: "blobscan-web"
    - name: SENTRY_IGNORE_API_RESOLUTION_ERROR
      value: "1"
    - name: IPFS_STORAGE_GATEWAY_URL
      value: "https://staging.blobscan.com"
    - name: IPFS_STORAGE_IPLD_URL
      value: "http://blobscan-ipld:8080"

# TODO: review:
#   - name: PUBLIC_SENTRY_DSN_WEB
#     value: ""

  networkPolicy:
    enabled: true
    ingress:
      from:
        # nginx ingress controller forwards external HTTP traffic.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
        # Prometheus scrapes /metrics.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000
          protocol: TCP

  image:
    tag: development
    pullPolicy: "Always"

  ingress:
    enabled: true
    className: nginx-pp
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-dns-gcp
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      # service.beta.kubernetes.io/do-loadbalancer-name: staging.blobscan.com
    hosts:
      - host: "staging.blobscan.com"
        paths:
        - path: "/"
          pathType: Prefix
    tls:
      - secretName: staging-blobscan-tls
        hosts:
          - "staging.blobscan.com"


blobscan-ipld:
  enabled: true

  fullnameOverride: "blobscan-ipld"

  podLabels:
    environment: staging

  annotations:
    keel.sh/policy: "force"
    keel.sh/match-tag: "true"
    keel.sh/approvals: "0"

  image:
    tag: latest
    pullPolicy: "Always"

  # Run in push-API mode: blobs are POSTed to /blob; no beacon RPC needed.
  customCommand: ["blobscan-ipld", "serve"]
  #customCommand: ["blobscan-ipld", "serve", "-pull"]

  # Provision the ipld database (ipld_mainnet) in the existing staging CNPG
  # cluster. Owner role "blobscan" already exists.
  database:
    create: true
    clusterName: "blobscan-staging-db-cluster"
    name: "ipld_mainnet"
    owner: "blobscan"

  # State file lives on a retained PVC; CAR archives use ephemeral storage.
  persistence:
    enabled: true
    storageClass: "do-block-storage-retain"
    size: 20Gi

  config:
    NETWORK_NAME: "mainnet"
    IPFS_API_ADDR: "http://tailscale-subnet-router.tailscale.svc.cluster.local:5001"
    IPFS_PIN_ON_ADD: "true"
    DATA_DIR: "/data"
    CAR_DIR: "/car"
    # GENERATOR_START_EPOCH: "456550"
    # Push API listen address (serve mode).
    GENERATOR_API_LISTEN: ":8080"
    # Uncomment to report CID references back to the blobscan API.
    # BLOBSCAN_API_URL: "http://blobscan-api:3001"

  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  networkPolicy:
    enabled: true
    ingress:
      from:
        # blobscan-api POSTs blobs to /blob on the push API (8080).
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: blobscan-api
        # Prometheus scrapes /metrics.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP

  serviceMonitor:
    enabled: true
    relabelings:
      - action: replace
        replacement: staging
        targetLabel: environment

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi


blobscandb:
  enabled: false

redis:
  enabled: true
  global:
    defaultStorageClass: "do-block-storage-retain"

  image:
    registry: ghcr.io
    repository: element-hq/bitnamilegacy/redis
    tag: 7.2.5-debian-12-r4

  metrics:
    enabled: true
    image:
      registry: ghcr.io
      repository: element-hq/bitnamilegacy/redis-exporter
      tag: 1.58.0-debian-12-r4
    serviceMonitor:
      # TODO: enable
      enabled: false

  master:
    persistence:
      enabled: true
      storageClass: "do-block-storage-retain"
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    resources:
      limits:
        cpu: 1
        memory: 2Gi
        ephemeral-storage: 2Gi

      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 50Mi
