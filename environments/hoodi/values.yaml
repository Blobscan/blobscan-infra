blobscan-ipld:
  enabled: true

  fullnameOverride: "blobscan-ipld"

  podLabels:
    environment: hoodi

  annotations:
    keel.sh/policy: "force"
    keel.sh/match-tag: "true"
    keel.sh/approvals: "0"

  image:
    tag: latest
    pullPolicy: "Always"

  # Run in push-API mode: blobs are POSTed to /blob; no beacon RPC needed.
  customCommand: ["blobscan-ipld", "serve"]

  # Provision the ipld database in the existing hoodi CNPG cluster.
  # Owner role "blobscan" already exists.
  database:
    create: true
    clusterName: "blobscan-hoodi-db-cluster"
    name: "ipld_hoodi"
    owner: "blobscan"

  # State file lives on a retained PVC; CAR archives use ephemeral storage.
  persistence:
    enabled: true
    storageClass: "do-block-storage-retain"
    size: 20Gi

  config:
    NETWORK_NAME: "hoodi"
    IPFS_API_ADDR: "http://tailscale-subnet-router.tailscale.svc.cluster.local:5001"
    IPFS_PIN_ON_ADD: "false"
    DATA_DIR: "/data"
    CAR_DIR: "/car"
    GENERATOR_START_EPOCH: "107106"
    # Push API listen address (serve mode).
    GENERATOR_API_LISTEN: ":8080"

  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  networkPolicy:
    enabled: true
    ingress:
      from:
        # blobscan-api POSTs blobs to /blob on the push API (8080).
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: blobscan-api
        # Prometheus scrapes /metrics.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP

  serviceMonitor:
    enabled: true
    relabelings:
      - action: replace
        replacement: hoodi
        targetLabel: environment

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

blobscandb:
  enabled: false

redis:
  enabled: true
  global:
    defaultStorageClass: "do-block-storage-retain"

  image:
    registry: ghcr.io
    repository: element-hq/bitnamilegacy/redis
    tag: 7.2.5-debian-12-r4

  metrics:
    enabled: true
    image:
      registry: ghcr.io
      repository: element-hq/bitnamilegacy/redis-exporter
      tag: 1.58.0-debian-12-r4
    serviceMonitor:
      # TODO: enable
      enabled: false

  master:
    persistence:
      enabled: true
      storageClass: "do-block-storage-retain"
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    resources:
      limits:
        cpu: 150m
        memory: 2Gi
        ephemeral-storage: 2Gi

      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 50Mi
