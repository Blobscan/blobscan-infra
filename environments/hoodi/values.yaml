blobscan-api:
  annotations:
    keel.sh/policy: "force"
    keel.sh/match-tag: "true"
    keel.sh/approvals: "0"

  podLabels:
    environment: hoodi

  externalConfigMaps:
    - "blobscan"

  fullnameOverride: "blobscan-api"
  config:
    CHAIN_ID: "560048"
    NETWORK_NAME: "hoodi"
    BLOBSCAN_API_BASE_URL: "https://api.hoodi.blobscan.com"
    POSTGRES_STORAGE_ENABLED: "false"
    METRICS_ENABLED: "true"
    LOG_LEVEL: http
    TRUSTED_PROXIES: "10.108.0.0/20,10.109.0.0/16"
    # TODO: in web too?
    BLOB_DATA_API_ENABLED: "false"

  extraEnv:
    - name: BLOB_PROPAGATOR_COMPLETED_JOBS_AGE
      value: "1"
    - name: PRIMARY_BLOB_STORAGE
      value: "IPFS"
    - name: MATOMO_ENABLED
      value: "true"
    - name: MATOMO_SITE_ID
      value: "2"
    - name: MATOMO_URL
      value: "https://matomo.blobscan.com/matomo.php"
    - name: IPFS_STORAGE_ENABLED
      value: "true"
    - name: IPFS_STORAGE_GATEWAY_URL
      value: "https://hoodi.blobscan.com"
    - name: IPFS_STORAGE_INTERNAL_GATEWAY_URL
      value: "http://tailscale-subnet-router.tailscale.svc.cluster.local:8080"
    - name: IPFS_STORAGE_IPLD_URL
      value: "http://blobscan-ipld:8080"

  bullmqExporter:
    enabled: true
    databaseMapping: "0:hoodi"
    image:
      pullPolicy: "Always"
    service:
      annotations:
        k8s.grafana.com/scrape: "true"
    serviceMonitor:
      enabled: true
      relabelings:
        - action: replace
          replacement: hoodi
          targetLabel: environment

#   serviceMonitor:
#     enabled: true
#     relabelings:
#       - action: replace
#         replacement: hoodi
#         targetLabel: environment

  service:
    annotations:
      k8s.grafana.com/scrape: "true"
  # TODO: remove servicemonitor
  serviceMonitor:
    enabled: true
    relabelings:
      - action: replace
        replacement: hoodi
        targetLabel: environment

  image:
    tag: latest
    pullPolicy: "Always"

  ingress:
    enabled: true
    className: nginx-pp
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-dns-gcp
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/limit-rps: "5"
      nginx.ingress.kubernetes.io/limit-rpm: "60"
      nginx.ingress.kubernetes.io/limit-burst-multiplier: "1"
      nginx.ingress.kubernetes.io/limit-whitelist: "10.108.0.0/20,10.109.0.0/16"

    hosts:
      - host: "api.hoodi.blobscan.com"
        paths:
        - path: "/"
          pathType: Prefix
    tls:
      - secretName: api-hoodi-blobscan-tls
        hosts:
          - "api.hoodi.blobscan.com"

  resources:
    limits:
      cpu: 2
      memory: 1Gi

    requests:
      cpu: 100m
      memory: 512Mi

