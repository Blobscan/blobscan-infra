image:
  repository: ghcr.io/tailscale/tailscale
  tag: v1.98.4
  pullPolicy: IfNotPresent

loginServer: ""
authKey: ""
hostname: "k8s-subnet-router"
routes: ""
headscaleClusterIP: ""
headscaleHostname: ""

proxies: []
# - name: example
#   localPort: 5001
#   target: <vpn-ip>:5001

ipfsMetrics:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  relabelings: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
