apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      hostAliases:
        - ip: {{ .Values.headscaleClusterIP | quote }}
          hostnames:
            - {{ .Values.headscaleHostname | quote }}
      containers:
        - name: tailscale
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TS_USERSPACE
              value: "false"
            - name: TS_KUBE_SECRET
              value: {{ .Release.Name }}-state
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: {{ .Values.hostname | quote }}
            - name: TS_ROUTES
              value: {{ .Values.routes | quote }}
            - name: TS_ACCEPT_DNS
              value: "false"
            - name: TS_EXTRA_ARGS
              value: "--login-server={{ .Values.loginServer }} --accept-routes"
          securityContext:
            # NET_ADMIN + the /dev/net/tun device below are sufficient for the
            # Tailscale subnet router; full privilege is not required.
            privileged: false
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- range .Values.proxies }}
        - name: proxy-{{ .name }}
          image: nginx:alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat > /etc/nginx/nginx.conf <<'EOF'
              worker_processes 1;
              events { worker_connections 1024; }
              http {
                server {
                  listen {{ .localPort }};
                  location / {
                    proxy_pass http://{{ .target }};
                    proxy_http_version 1.1;
                    proxy_set_header Connection "";
                    proxy_set_header Host "{{ .target }}";
                    proxy_request_buffering off;
                    proxy_buffering off;
                    client_max_body_size 0;
                  }
                }
              }
              EOF
              nginx -g 'daemon off;'
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
        {{- end }}
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
