apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.externalService.name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: ExternalName
  externalName: {{ .Values.externalService.externalName }}
  ports:
    - port: {{ .Values.externalService.port }}
      targetPort: {{ .Values.externalService.port }}
