image:
  tag: v0.28.0

controller:
  replicas: 1
  strategy: Recreate

env:
  HEADSCALE_SERVER_URL: https://hs.blobscan.com
  HEADSCALE_DERP_URLS: https://controlplane.tailscale.com/derpmap/default
  HEADSCALE_DERP_SERVER_ENABLED: "false"
  HEADSCALE_DERP_AUTO_UPDATE_ENABLED: "true"
  HEADSCALE_DERP_UPDATE_FREQUENCY: 24h
  HEADSCALE_DNS_BASE_DOMAIN: blobscan.internal
  HEADSCALE_DNS_MAGIC_DNS: "true"
  HEADSCALE_DNS_OVERRIDE_LOCAL_DNS: "true"
  HEADSCALE_DNS_SEARCH_DOMAINS: blobscan.internal
  HEADSCALE_DNS_NAMESERVERS_GLOBAL: "1.1.1.1 8.8.8.8"
  HEADSCALE_PREFIXES_V4: 100.90.1.0/24
  HEADSCALE_PREFIXES_V6: fd7a:115c:a1e0::/64
  HEADSCALE_LOG_LEVEL: info
  HEADSCALE_DNS_EXTRA_RECORDS_PATH: /dns/records
  HEADSCALE_TLS_CERT_PATH: /tls/tls.crt
  HEADSCALE_TLS_KEY_PATH: /tls/tls.key
  HEADSCALE_LISTEN_ADDR: 0.0.0.0:8443

configMaps:
  acl:
    enabled: true
    data:
      policy: |
        {
          "tagOwners": {
            "tag:admin": ["contact@blobscan.com"],
            "tag:infra": ["contact@blobscan.com"],
            "tag:homelab": ["contact@blobscan.com"]
          },
          "autoApprovers": {
            "routes": {
              "10.108.0.0/20": ["tag:infra"]
            }
          },
          "acls": [
            {
              "action": "accept",
              "src": ["tag:admin"],
              "dst": ["*:*"]
            },
            {
              "//": "Cluster (infra) reaches the homelab IPFS node: 5001 admin API + 8080 gateway only.",
              "action": "accept",
              "src": ["tag:infra"],
              "dst": ["tag:homelab:5001", "tag:homelab:8080"]
            },
            {
              "//": "Homelab reaches only the cluster-side IPFS proxy ports (5001/8080) on the subnet router, not every infra port.",
              "action": "accept",
              "src": ["tag:homelab"],
              "dst": ["tag:infra:5001", "tag:infra:8080"]
            }
          ]
        }
  dns:
    enabled: true
    data:
      records: |
        []

persistence:
  config:
    enabled: true
    type: pvc
    accessMode: ReadWriteOnce
    size: 2Gi
  tls:
    enabled: true
    type: secret
    name: hs-blobscan-tls
    mountPath: /tls
    readOnly: true

service:
  main:
    ports:
      http:
        port: 8443
        targetPort: 8443
      metrics:
        enabled: true
        port: 9090

ingress:
  main:
    enabled: true
    className: nginx-pp
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-dns-gcp
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    hosts:
      - host: hs.blobscan.com
        paths:
          - path: /
            pathType: Prefix
            service:
              port: 8443
    tls:
      - secretName: hs-blobscan-tls
        hosts:
          - hs.blobscan.com

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
