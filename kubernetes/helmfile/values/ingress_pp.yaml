controller:
  config:
    use-proxy-protocol: "true"
    use-forwarded-headers: "true"
    proxy-real-ip-cidr: "10.108.0.0/20"
    # Return 429 (not the nginx default 503) when limit-rps annotations trip,
    # so clients can tell throttling apart from an outage.
    limit-req-status-code: "429"
    limit-conn-status-code: "429"
    log-format-upstream: '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" "$host"'
  ingressClass: nginx-pp
  ingressClassResource:
    controllerValue: "k8s.io/ingress-nginx-pp"
    default: true
    name: "nginx-pp"
  metrics:
    enabled: "true"
    serviceMonitor:
      enabled: "true"
      metricRelabelings:
        - regex: exported_service|container|controller_class|controller_namespace|controller_pod|endpoint|instance|job|pod|service
          action: labeldrop
        - sourceLabels: [__name__]
          regex: nginx_ingress_controller_connect_duration_seconds_bucket
          action: drop
        - sourceLabels: [__name__]
          regex: nginx_ingress_controller_header_duration_seconds_bucket
          action: drop
        - sourceLabels: [__name__]
          regex: nginx_ingress_controller_request_size_bucket
          action: drop
        - sourceLabels: [__name__]
          regex: nginx_ingress_controller_bytes_sent_bucket
          action: drop

  service:
    # Fronted by a self-managed HAProxy LB, not a DO managed
    # LB. The Service must stay NodePort with pinned nodePorts because HAProxy
    # (haproxy.cfg) and the headscale ACL (values/headscale.yaml) hardcode
    # 30138/31636. Previously the live Service was NodePort only via manual
    # drift while these values still requested a LoadBalancer; pinning it here
    # keeps `helmfile apply` from provisioning a DO LB and reassigning ports.
    type: NodePort
    nodePorts:
      http: 30138
      https: 31636
