helmDefaults:
  createNamespace: true

repositories:
  - name: cnpg
    url: https://cloudnative-pg.github.io/charts
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: blobscan
    url: https://blobscan.github.io/blobscan-helm-charts
  - name: jetstack
    url: https://charts.jetstack.io
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: gabe565
    url: https://charts.gabe565.com

releases:
  - name: blackbox-exporter
    namespace: monitoring
    chart: prometheus-community/prometheus-blackbox-exporter
    version: 9.4.0
    values:
      - values/blackbox.yaml

  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: 1.17.1

# - name: grafana-k8s-monitoring
#   namespace: monitoring
#   chart: grafana/k8s-monitoring
#   version: 2.0.16
#   values:
#     - values/grafana_cloud.yaml
#   # TODO: helm upgrade --install --version ^2 --atomic --timeout 300s
    # TODO: test with diff

  - name: nginx-ingress-proxy
    namespace: ingress
    chart: ingress-nginx/ingress-nginx
    version: 4.12.1
    values:
      - values/ingress_pp.yaml

  - name: cnpg
    namespace: cnpg-system
    chart: cnpg/cloudnative-pg
    version: 0.23.2

  - name: headscale
    namespace: headscale
    chart: gabe565/headscale
    version: 0.16.0
    values:
      - values/headscale.yaml

  - name: tailscale-subnet-router
    namespace: tailscale
    chart: ../helm/tailscale-subnet-router
    values:
      - values/tailscale.yaml
    secrets:
      - secrets/tailscale.yaml
