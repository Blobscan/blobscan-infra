# gitleaks config — extends the default ruleset and adds allowlists tuned for
# this repo. The goal: catch genuine PLAINTEXT secrets while ignoring the SOPS
# ciphertext that is meant to live in the repo.

[extend]
useDefault = true

[allowlist]
description = "SOPS-encrypted material and known-public values"

# Ignore everything inside SOPS-encrypted blobs:
#   - ENC[AES256_GCM,data:...]   encrypted values
#   - PGP MESSAGE blocks + sops metadata (enc, mac, fingerprint)
# These are ciphertext by design; their high entropy would otherwise trip the
# generic high-entropy rules.
regexTarget = "line"
regexes = [
  '''ENC\[AES256_GCM,''',
  '''-----BEGIN PGP MESSAGE-----''',
  '''^\s*(enc|mac|fp|lastmodified|version|created_at):''',
]

# Known-public client-side identifiers (not secrets):
#   - PostHog project API key (phc_...) is designed to ship in browsers.
stopwords = [
  "phc_",
]

# Encrypted secret files are managed by SOPS; the structure (key names, ENC[]
# blobs) is expected. Real plaintext leaks in these files are still caught
# because the allowlist above only exempts the ciphertext lines, not arbitrary
# values. Paths are NOT blanket-ignored on purpose.
