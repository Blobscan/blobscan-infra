creation_rules:
  - pgp: "FE7F3ABE1470369E0839081616EFB510AB8B3C4C"
    # Fail-closed: encrypt every value by default. Only the clearly non-secret
    # configuration keys listed below are left in plaintext (for readable diffs).
    # Any new key — e.g. a freshly added *_API_KEY — is encrypted automatically,
    # so a missing allowlist entry can no longer leak a secret in this public repo.
    unencrypted_regex: '^(enabled|provider|endpointURL|destinationPath|create|name|retentionPolicy|compression|maxParallel|encryption)$'
