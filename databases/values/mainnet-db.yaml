cluster:
  instances: 2
  initdb:
    database: blobscan_mainnet_prod
    owner: blobscan

  storage:
    size: 100Gi

  walStorage:
    enabled: true
    size: 30Gi
    storageClass: "do-block-storage-retain"

  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "4"

backups:
  scheduledBackups:
    - name: daily-backup
      schedule: "0 10 8 * * *"
      backupOwnerReference: none
      method: barmanObjectStore
