cluster:
  instances: 2
  initdb:
    database: blobscan_mainnet_prod
    owner: blobscan

  storage:
    size: 100Gi

  walStorage:
    enabled: true
    size: 20Gi
    storageClass: "do-block-storage-retain"

  resources:
    requests:
      memory: "3379Mi"
      cpu: "3"
    limits:
      memory: "4306Mi"
      cpu: "6"

backups:
  scheduledBackups:
    - name: daily-backup
      schedule: "0 10 8 * * *"
      backupOwnerReference: none
      method: barmanObjectStore
