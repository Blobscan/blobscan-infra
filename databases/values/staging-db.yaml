cluster:

  initdb:
    database: blobscan_mainnet_staging
    owner: blobscan

  storage:
    size: 100Gi

  walStorage:
    enabled: true
    size: 30Gi
    storageClass: "do-block-storage-retain"

  resources:
    requests:
      memory: "1Gi"
      cpu: "1"
    limits:
      memory: "2Gi"
      cpu: "3"

backups:
  scheduledBackups:
    - name: daily-backup
      schedule: "0 10 0 * * *"  # staging
      backupOwnerReference: none
      method: barmanObjectStore
