name: secret-scan

# Fail the build if a plaintext secret is committed. This is the verification
# layer behind the SOPS "encrypt by default" policy in .sops.yaml: even if a
# value is mistakenly added unencrypted to a *secrets.yaml, gitleaks catches it
# here before it reaches the public default branch.

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so pushes scan the new commits' diff

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
